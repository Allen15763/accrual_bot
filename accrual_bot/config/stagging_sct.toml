# =============================================================================
# stagging_sct.toml - SCT entity-specific configuration
# =============================================================================
# SCT Pipeline 配置、業務規則、步驟啟用設定
# 此檔案會透過 ConfigManager._deep_merge() 合併至 _config_toml

# =============================================================================
# Pipeline 配置
# =============================================================================
[pipeline.sct]
enabled_po_steps = [
    "SCTDataLoading",
    "SCTColumnAddition",
    "APInvoiceIntegration",
    "PreviousWorkpaperIntegration",
    "ProcurementIntegration",
    "DateLogic",
    "SCTERMLogic",
    "SCTAssetStatusUpdate",
    "SCTAccountPrediction",
    "SCTPostProcessing",
]

enabled_pr_steps = [
    "SCTPRDataLoading",
    "SCTColumnAddition",
    "PreviousWorkpaperIntegration",
    "ProcurementIntegration",
    "DateLogic",
    "SCTPRERMLogic",
    "SCTAccountPrediction",
    "SCTPostProcessing",
]


# =============================================================================
# SCT Column Defaults
# =============================================================================
[sct_column_defaults]
# S&M 科目清單（用於 SCTColumnAdditionStep._determine_sm_status）
sm_accounts = ["650003", "450014"]
region = "TW"
default_department = "000"
prepay_liability = "111112"

# =============================================================================
# SCT PPE 資產狀態邏輯配置
# =============================================================================
[sct.ppe]
trigger_keywords = ["訂金", "安裝款", "驗收款", "保固"]
acceptance_keyword = "驗收"
warranty_keyword = "保固"
completed_status = "已完成(PPE)"
incomplete_status = "未完成(PPE)"
protected_statuses = [
    "已入帳", "上期已入PPE", "上期FN備註已完成或Voucher number",
    "Outright", "Consignment", "Outsourcing",
]

[sct]
ap_columns = [
    "Company", "Period", "Vendor Name", "Invoice Number",
    "Invoice Amount", "PO_LINE_NUMBER", "PO Number",
    "Receipt Number", "Match Type", "VOUCHER_NUMBER"
]

logistics_supplier = [
    "TW_高銓通運股份有限公司", "TW_統一數網股份有限公司", "TW_億榮物流股份有限公司",
    "TW_佳澄物流股份有限公司", "TW_嘉里快遞股份有限公司", "TW_福星高股份有限公司",
    "TW_韻達國際股份有限公司"
]

deposit_keywords = '''(?i)押金|保證金|Deposit|找零金|定存'''
deposit_keywords_label = "摘要內有押金/保證金/Deposit/找零金"
# =============================================================================
# SCT ERM 狀態判斷規則 - 配置驅動
# =============================================================================
# 按 priority 順序執行，每次執行後自動更新 no_status mask
# 使用 prebuilt_masks 引用預先計算的條件
# 初始規則與 SPX 相同，後續可獨立調整
# =============================================================================


# --- ERM 條件 : Remarked by 上月 FN 或 Remarked by Procurement，包含`刪|關`
[[sct_erm_status_rules.conditions]]
priority = 1
status_value = "需求取消"
note = "Remarked by 上月 FN 或 Remarked by Procurement，包含 「刪」 或 「關」"
combine = "or"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by 上月 FN"
type = "contains"
pattern = "(?i)刪|關"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by Procurement"
type = "contains"
pattern = "(?i)刪|關"

# --- ERM 條件 : Remarked by 上月 FN 包含 `已完成` & Remarked by Procurement，包含`現狀結案|需求取消`
[[sct_erm_status_rules.conditions]]
priority = 2
status_value = "現狀結案"
note = "Remarked by 上月 FN 包含 「已完成」 以及 Remarked by Procurement包含「現狀結案」或「需求取消」"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by 上月 FN"
type = "contains"
pattern = "(?i)已完成"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by Procurement"
type = "contains"
pattern = "(?i)現狀結案|需求取消"

# --- ERM 條件 : 供應商名稱中包含Outright ---
[[sct_erm_status_rules.conditions]]
priority = 3
status_value = "Outright"
apply_to = ["PO", "PR"]
note = "供應商名稱中包含Outright"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "{TYPE} Supplier"
type = "contains"
pattern = "(?i)Outright"

# --- ERM 條件 : 供應商名稱中包含Consignment ---
[[sct_erm_status_rules.conditions]]
priority = 4
status_value = "Consignment"
apply_to = ["PO", "PR"]
note = "供應商名稱中包含Consignment"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "{TYPE} Supplier"
type = "contains"
pattern = "(?i)Consignment"

# --- ERM 條件 : 供應商名稱中包含Outsourcing ---
[[sct_erm_status_rules.conditions]]
priority = 5
status_value = "Outsourcing"
apply_to = ["PO", "PR"]
note = "供應商名稱中包含Outsourcing"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "{TYPE} Supplier"
type = "contains"
pattern = "(?i)Outsourcing"

# --- ERM 條件 : 上期已入PPE（前期FN標註）---
[[sct_erm_status_rules.conditions]]
priority = 6
status_value = "上期已入PPE"
note = "前期FN備註明確標註「上期已入PPE」"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by 上月 FN"
type = "contains"
pattern = "(?i)上期已入PPE"

# --- ERM 條件 : 上期已完成（前期FN標註）---
[[sct_erm_status_rules.conditions]]
priority = 7
status_value = "上期FN備註已完成或Voucher number"
note = "前期FN備註明確標註「已完成」或 Voucher number"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by 上月 FN"
type = "contains"
pattern = "(?i)已完成|\\d{8}"

# --- ERM 條件 : 已入帳（voucher_number）---
[[sct_erm_status_rules.conditions]]
priority = 8
status_value = "已入帳"
note = "有voucher_number、ERM在摘要範圍內、ERM<=月結月份、收貨數量匹配、有帳務記錄、採購/FN備註已完成/rent、非FA科目"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "voucher_number"
type = "is_not_null"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_in_range"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_le_date"
[[sct_erm_status_rules.conditions.checks]]
type = "qty_matched"
[[sct_erm_status_rules.conditions.checks]]
type = "has_billing"
[[sct_erm_status_rules.conditions.checks]]
type = "remark_completed"
[[sct_erm_status_rules.conditions.checks]]
type = "not_fa"

# --- ERM 條件 : 已入帳（voucher_number）；排除備註跟billing amt限制---
[[sct_erm_status_rules.conditions]]
priority = 9
status_value = "已入帳"
note = "有voucher_number、ERM在摘要範圍內、ERM<=月結月份、收貨數量匹配、非FA科目"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "voucher_number"
type = "is_not_null"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_in_range"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_le_date"
[[sct_erm_status_rules.conditions.checks]]
type = "qty_matched"
[[sct_erm_status_rules.conditions.checks]]
type = "not_fa"

# --- ERM 條件 : 摘要內有物流運費 ---
[[sct_erm_status_rules.conditions]]
priority = 10
status_value = "AR估"
apply_to = ["PO", "PR"]
note = "供應商為供應商為高銓,統一數網,億榮,佳澄,嘉里,福星高,韻達且摘要中包含物流運費/Shipping fee"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "{TYPE} Supplier"
type = "in_list"
list_key = "sct.logistics_supplier"
[[sct_erm_status_rules.conditions.checks]]
field = "Item Description"
type = "contains"
pattern = "(?i)物流運費|Shipping fee|Logistics fee"


# --- 條件 : 押金/保證金識別 ---
[[sct_erm_status_rules.conditions]]
priority = 11
status_value_key = "sct.deposit_keywords_label"
apply_to = ["PO", "PR"]
note = "Item Description包含押金/保證金/Deposit/找零金/定存，且GL#非FA科目(199999)"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "Item Description"
type = "contains"
pattern_key = "sct.deposit_keywords"
[[sct_erm_status_rules.conditions.checks]]
field = "GL#"
type = "not_equals"
value_key = "fa_accounts.sct"

# --- ERM 條件 : 已完成(not_billed) ---
[[sct_erm_status_rules.conditions]]
priority = 12
status_value = "已完成(not_billed)"
note = "採購/FN備註已完成、上月FN PR非未完成、尚未標籤、ERM在範圍內、ERM<=月結、收貨匹配、未入帳(Billed Amount=0)"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "remark_completed"
[[sct_erm_status_rules.conditions.checks]]
type = "pr_not_incomplete"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_in_range"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_le_date"
[[sct_erm_status_rules.conditions.checks]]
type = "qty_matched"
[[sct_erm_status_rules.conditions.checks]]
type = "not_billed"

# --- ERM 條件 : Check收貨 ---
[[sct_erm_status_rules.conditions]]
priority = 13
status_value = "Check收貨"
note = "採購備註非error、尚未標籤、ERM在範圍內、ERM<=月結、收貨數量不匹配(Entry Qty!=Received Qty)"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "not_error"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_in_range"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_le_date"
[[sct_erm_status_rules.conditions.checks]]
type = "qty_not_matched"

# --- ERM 條件 : 未完成 ---
[[sct_erm_status_rules.conditions]]
priority = 14
status_value = "未完成"
note = "採購備註非error、尚未標籤、ERM在範圍內、ERM>月結月份"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "not_error"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_in_range"
[[sct_erm_status_rules.conditions.checks]]
type = "erm_gt_date"

# --- ERM 條件 : 範圍錯誤_租金 ---
[[sct_erm_status_rules.conditions]]
priority = 15
status_value = "error(Description Period is out of ERM)_租金"
note = "採購備註非error、尚未標籤、ERM不在摘要期間內(且非格式錯誤)、摘要包含租金"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "not_error"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "out_of_range"
[[sct_erm_status_rules.conditions.checks]]
field = "Item Description"
type = "contains"
pattern = "(?i)租金"

# --- ERM 條件 : 範圍錯誤_薪資 ---
[[sct_erm_status_rules.conditions]]
priority = 16
status_value = "error(Description Period is out of ERM)_薪資"
note = "採購備註非error、尚未標籤、ERM不在摘要期間內(且非格式錯誤)、摘要包含派遣/Salary/Agency Fee"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "not_error"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "out_of_range"
[[sct_erm_status_rules.conditions.checks]]
field = "Item Description"
type = "contains"
pattern = "(?i)派遣|Salary|Agency Fee"

# --- ERM 條件 : 範圍錯誤（一般）---
[[sct_erm_status_rules.conditions]]
priority = 17
status_value = "error(Description Period is out of ERM)"
note = "採購備註非error、尚未標籤、ERM不在摘要期間內(且非格式錯誤)"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
type = "not_error"
[[sct_erm_status_rules.conditions.checks]]
type = "no_status"
[[sct_erm_status_rules.conditions.checks]]
type = "out_of_range"

# --- ERM 條件 : 採購備註覆蓋 error/未完成 ---
[[sct_erm_status_rules.conditions]]
priority = 18
status_value = "已完成(Procurement備註)"
override_statuses = [
    "error(Description Period is out of ERM)",
    "error(Description Period is out of ERM)_租金",
    "error(Description Period is out of ERM)_薪資",
    "未完成",
    "Check收貨",
    "格式錯誤，退單",
]
note = "採購備註已完成，覆蓋error/未完成/Check收貨/格式錯誤狀態"
combine = "and"
[[sct_erm_status_rules.conditions.checks]]
field = "Remarked by Procurement"
type = "contains"
pattern = "(?i)已完成"


# =============================================================================
# SCT PR ERM 狀態規則（配置驅動）
# =============================================================================
# 與 PO 的核心差異：
# 1. 不判斷收貨狀態（無 Received Quantity 相關邏輯）
# 2. 不判斷入賬狀態（無 Billed Amount 相關邏輯）
# 注意：SPX PR 規則 4（rent ops list）和 7（asset suppliers）引用 SPX 專屬配置，
# SCT 目前不使用這些規則，後續如有需要可獨立新增。
# =============================================================================


