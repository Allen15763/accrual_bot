[[spx_status_stage1_rules.conditions.checks]]
field = "Billed Quantity"
type = "equals"
value = 0
cast = "Float64"
[[spx_status_stage1_rules.conditions.checks]]
field = "GL DATE"
type = "is_not_null"
[[spx_status_stage1_rules.conditions.checks]]
field = "GL#"
type = "in_list"
values = ["520036", "666666"]

