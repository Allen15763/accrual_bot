# =============================================================================
# SPX PR ERM 狀態規則（配置驅動）
# 對應 SPXPRERMLogicStep 的 8 個 PR 狀態條件
#
# 與 PO 的核心差異：
# 1. 不判斷收貨狀態（無 Received Quantity 相關邏輯）
# 2. 不判斷入賬狀態（無 Billed Amount 相關邏輯）
# 3. 基於業務類型（租金/Intermediary/資產）進行判斷
# =============================================================================

